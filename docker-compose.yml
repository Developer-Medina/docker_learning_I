services:
  db:
    image: mariadb:11.4
    container_name: jwst_db
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}

    ports:
      - "3313:3306"

    volumes:
      - db_data:/var/lib/mysql

    networks:
      - jwst_net

    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    container_name: jwst_app

    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    
    depends_on:
      db:
        condition: service_healthy

    networks:
      - jwst_net

volumes:
  db_data:

networks:
  jwst_net:
    driver: bridge
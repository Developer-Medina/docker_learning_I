services:
  db:
    image: mariadb:11.4
    container_name: cotacao_db
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}

    ports:
      - "3313:3306"

    volumes:
      - db_data:/var/lib/mysql

  app:
    build: .

volumes:
  db_data: